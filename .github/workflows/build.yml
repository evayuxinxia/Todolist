name: Build Tauri App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: 'https://registry.npmmirror.com'

      - name: Install npm dependencies
        run: npm install --registry=https://registry.npmmirror.com
        timeout-minutes: 20
        continue-on-error: true

      - name: Check npm install status
        run: echo "npm install exit code: $LASTEXITCODE"

      - name: Show npm version
        run: npm --version

      - name: List installed packages
        run: npm list --depth=0

      - name: Build frontend
        run: npm run build
        timeout-minutes: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Show Rust version
        run: |
          rustc --version
          cargo --version

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@latest --registry=https://registry.npmmirror.com
        timeout-minutes: 10

      - name: Show Tauri version
        run: tauri --version

      - name: Build Tauri app
        run: npx tauri build --skip-signing --verbose
        env:
          CI: true
          CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
        timeout-minutes: 45

      - name: List build artifacts
        run: Get-ChildItem -Path "src-tauri/target/release/bundle" -Recurse
        continue-on-error: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: todo-assistant-installer
          path: |
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.zip
