name: Simple Build Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install npm dependencies
        run: npm install
        timeout-minutes: 20
        id: npm-install

      - name: Check npm install result
        run: echo "npm install exit code: %ERRORLEVEL%"

      - name: Build frontend
        run: npm run build
        timeout-minutes: 15
        id: frontend-build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Run cargo check
        run: cd src-tauri && cargo check
        timeout-minutes: 30
        id: cargo-check

      - name: Check cargo check result
        run: echo "cargo check exit code: %ERRORLEVEL%"
