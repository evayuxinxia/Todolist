name: Test Build Steps

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install npm dependencies
        run: npm install
        timeout-minutes: 20

      - name: Build frontend
        run: npm run build
        timeout-minutes: 15

      - name: List files
        run: Get-ChildItem -Recurse -Path dist

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Check Cargo.toml
        run: cat src-tauri/Cargo.toml

      - name: Run cargo check
        run: cd src-tauri && cargo check
        timeout-minutes: 30
